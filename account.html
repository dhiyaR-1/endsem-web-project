<!doctype html>
<html>
<head>
    <title>Pharmacy - Sign Up</title>

    <style>
        body {
            display:flex;
            flex-direction: column;
            background-color: beige;
            margin:0;
            height:100vh;
        }

        header {
            display:flex;
            justify-content:center;
            align-items:center;
            background-color: cadetblue;
            padding: 10px;
        }

        #parent{
            margin: 40px auto;
            width: 50%;
            box-shadow: 0 0 20px;
            background: white;
        }

        form {
            display:flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 30px;
        }

        h1{
            margin:0;
        }

        input{
            padding:5px;
        }
    </style>
</head>

<body>

<div id="parent">

<header>
    <h1>Sign Up</h1>
</header>

<form onsubmit="return validateForm(event)">
    Name:
    <input type="text" id="t1" placeholder="Enter Name">

    Mobile No:
    <input type="text" id="t2" placeholder="Enter Valid Phone Number">

    Address:
    <input type="email" id="t3" placeholder="Enter Address">

    Blood Group:
    <input type="text" id="t4" placeholder="Enter Blood Group">

    <input type="submit">
</form>

</div>

<script>
function validateForm(event) {
    event.preventDefault(); 

    let phone = document.getElementById("t2").value;
    let email = document.getElementById("t3").value;

    if (phone.length < 10) {
        alert("Not a valid phone number");
        return false;
    }

    if (!email.includes("@")) {
        alert("Not a valid email/address");
        return false;
    }

    alert("Signup successful!");
    window.location.href = "index.html";
    return true;
}
</script>

</body>
</html>
