<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Support</title>

    <style>
        body{
            background-color: beige;
            text-align:center;
        }

        div{
            background-color: cadetblue;
            padding:10px;
        }

        textarea, select{
            margin:10px;
            padding:5px;
        }

        button{
            padding:10px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div>
    <h1>CONTACT & EMERGENCY SUPPORT</h1>
</div>

<h3>Convey your message</h3>

<textarea id="msg" rows="4" cols="40" placeholder="Enter your message here..."></textarea>

<br><br>

<label>Urgency level (1-5)</label>
<br>

<select id="urgency">
    <option value="">Select</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
</select>

<br><br>

<h3>Enter your contact details</h3>

<textarea id="details" rows="3" cols="40" placeholder="Enter your contact details..."></textarea>

<br><br>

<button onclick="submitForm()">Submit</button>

<script>
function submitForm() {
    let msg = document.getElementById("msg").value;
    let urgency = document.getElementById("urgency").value;
    let details = document.getElementById("details").value;

    if (msg.length === 0) {
        alert("Message cannot be empty");
        return;
    }

    if (msg.length > 30) {
        alert("Limit is 30 characters only");
        return;
    }

    if (urgency === "") {
        alert("Please select urgency level");
        return;
    }

    if (details.length === 0) {
        alert("Please enter contact details");
        return;
    }

    alert("Message submitted successfully!");
}
</script>

</body>
</html>
