<!doctype html>
<html>
<head>
    <title>Medicine Catalogue</title>

    <style>
        h1{
            background-color: cadetblue;
            display: flex;
            justify-content: center;
            height: 60px;
            align-items: center;
            margin: 40px;
        }

        #box1{
            display: flex;
            justify-content: center;
            background-color: beige;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 0 20px;
        }

        #box2{
            margin: 20px;
            padding: 20px;
        }

        table{
            border-collapse: collapse;
        }

        th, td{
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        footer{
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        button{
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>MEDICINE CATALOGUE</h1>

<div id="box1">
    <table>
        <tr>
            <th>Medicine</th>
            <th>Availability</th>
            <th>Add To Cart</th>
        </tr>

        <tr>
            <td>Astia</td>
            <td>26</td>
            <td><button onclick="addToCart('Astia')">Add</button></td>
        </tr>

        <tr>
            <td>Byria</td>
            <td>43</td>
            <td><button onclick="addToCart('Byria')">Add</button></td>
        </tr>

        <tr>
            <td>Cydia</td>
            <td>31</td>
            <td><button onclick="addToCart('Cydia')">Add</button></td>
        </tr>

        <tr>
            <td>Firia</td>
            <td>27</td>
            <td><button onclick="addToCart('Firia')">Add</button></td>
        </tr>

        <tr>
            <td>Rustia</td>
            <td>29</td>
            <td><button onclick="addToCart('Rustia')">Add</button></td>
        </tr>
    </table>
</div>

<div id="box2">
    <h2>My Cart</h2>
    <ul id="cart"></ul>
</div>

<footer>
    <button onclick="window.location.href='checkout.html'">PROCEED</button>
</footer>

<script>
   
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
        let cartList = document.getElementById("cart");
        cartList.innerHTML = "";

        cart.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            cartList.appendChild(li);
        });
    }

    function addToCart(item) {
        cart.push(item);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
        alert(item + " added to cart");
    }

    
    renderCart();
</script>

</body>
</html>
